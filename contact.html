<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanThreads | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">URBANTHREADS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
            <a href="cart.html">Cart (<span id="cartCount">0</span>)</a>
        </nav>
    </header>

    <main class="contact-container">
        <h2>Get in touch</h2>
        <p>Fill out the form below and we will reply within 24 hours.</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Full name *</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email address *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone number</label>
                <input type="tel" id="phone" placeholder="+353 1 234 5678">
            </div>
            <div class="form-group">
                <label for="message">Message *</label>
                <textarea id="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
            <div id="formFeedback" class="feedback"></div>
        </form>
    </main>

    <footer>
        <p>© 2026 UrbanThreads – Built with Node.js + MySQL</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
